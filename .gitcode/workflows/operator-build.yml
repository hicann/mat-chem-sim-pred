name: CI / Ascend C Operator Build & Test

on:
  push:
    branches: [master, main, roadmap-hjx]
    paths:
      - 'simulation/AI4MD/**'
      - 'simulation/AI4PDE/**'
      - '.gitcode/workflows/operator-build.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'simulation/AI4MD/**'
      - 'simulation/AI4PDE/**'

# YAML anchor: 所有 Ascend C 编译/测试 Job 共享的 runner + 容器配置
.ascend-job: &ascend-job
  runs-on: ascend-runner
  container:
    image: swr.cn-north-4.myhuaweicloud.com/ascend/cann:7.0.RC1-ubuntu22.04-aarch64
  env:
    ASCEND_TOOLKIT_HOME: /usr/local/Ascend/ascend-toolkit/latest

jobs:
  # ================================================================
  # Job 1: AI4MD 经典力场算子
  # ================================================================
  ai4md-lj:
    name: AI4MD / LJ Force
    <<: *ascend-job
    steps:
      - uses: actions/checkout@v4

      - name: Build LJ
        working-directory: simulation/AI4MD/Lennard_Jones
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DSOC_VERSION=Ascend910B1
          make -j$(nproc)

      - name: Test LJ (C++ UT)
        working-directory: simulation/AI4MD/Lennard_Jones/build
        run: ctest --output-on-failure -j$(nproc)

      - name: Test LJ (Python IT)
        working-directory: simulation/AI4MD/Lennard_Jones
        run: |
          pip install pytest numpy torch
          python -m pytest tests/ -v --tb=short

  ai4md-dpd:
    name: AI4MD / DPD
    <<: *ascend-job
    steps:
      - uses: actions/checkout@v4

      - name: Build DPD
        working-directory: simulation/AI4MD/Dissipative_particle_dynamics
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DSOC_VERSION=Ascend910B1
          make -j$(nproc)

      - name: Test DPD
        working-directory: simulation/AI4MD/Dissipative_particle_dynamics/build
        run: ctest --output-on-failure

  ai4md-gaff2:
    name: AI4MD / GAFF2
    <<: *ascend-job
    steps:
      - uses: actions/checkout@v4

      - name: Build GAFF2
        working-directory: simulation/AI4MD/GAFF2
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DSOC_VERSION=Ascend910B1
          make -j$(nproc)

  # ================================================================
  # Job 2: AI4PDE 算子
  # ================================================================
  ai4pde-pinn:
